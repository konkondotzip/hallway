<ng-template #setUsername let-modal>
  <div class="modal-header">
    <h4 class="modal-title">Nutzernamen eingeben</h4>
  </div>

  <div class="modal-body">
    <form #usernameForm="ngForm">
      <div class="mb-3">
        @if (usernameInput.invalid && usernameInput.touched) {
        <label for="usernameInput">Bitte gib einen Nutzernamen ein.</label>
        }
        <input class="form-control" name="username" placeholder="Nutzername" [(ngModel)]="username" required
          #usernameInput="ngModel">
      </div>
    </form>
  </div>

  <div class="modal-footer">
    <button type="button" class="btn btn-outline-secondary" [disabled]="usernameForm.invalid"
      (click)="modal.close(username)">
      Speichern
    </button>
  </div>
</ng-template>

<div id="hallway-container" class="hallway-container">
  <div id="hallway-stage" class="hallway-stage" [hidden]="!modalClosed()">
    <ko-stage #stage [config]="configStage">
      <ko-layer>
        <ko-text #fps [config]="configFps" />
        <ko-text #gameState [config]="configGameStatus" />
        <ko-text #score [config]="configScore" />
        <ko-text #levelGui [config]="configLevelGui" />
        <ko-line #level [config]="configLevel" />
        <ko-line #snake [config]="configSnake" />
        <ko-circle #player [config]="configPlayer" />
      </ko-layer>
    </ko-stage>
  </div>
</div>
@if(modalClosed()) {
<div>
  <button type="button" class="btn btn-outline-primary toggle-highscores" [class.active]="!hideHighscores()"
    (click)="collapse.toggle()" [attr.aria-expanded]="!hideHighscores()">
    Zeige Highscores
  </button>
  <div #collapse="ngbCollapse" class="highscores" [(ngbCollapse)]="hideHighscores" [horizontal]="true">
    <app-highscores [username]="username" />
  </div>
</div>
}
